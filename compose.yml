name: no-excuse

x-api: &api
  build:
    context: ./api
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  working_dir: /app
  volumes:
    - ./api:/app
  environment:
    APP_ENV: local
    APP_DEBUG: "true"
    APP_KEY: "base64:bm8tZXhjdXNlLWRldi1rZXktMDAwMDAwMDAwMDAwMDA="
    APP_URL: http://localhost:18080
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: no_excuse
    DB_USERNAME: no_excuse
    DB_PASSWORD: no_excuse
    CACHE_STORE: redis
    QUEUE_CONNECTION: redis
    REDIS_CLIENT: predis
    REDIS_HOST: redis
    MAIL_MAILER: log
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  api:
    <<: *api
    ports:
      - "18080:8000"

  queue-intake:
    <<: *api
    command: php artisan queue:work redis --queue=candidate-intake,notifications --sleep=1 --tries=3

  queue-scoring:
    <<: *api
    command: php artisan queue:work redis --queue=candidate-scoring --sleep=1 --tries=3

  scheduler:
    <<: *api
    command: php artisan schedule:work

  web:
    build:
      context: ./web
    working_dir: /app
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:18080/api
      NPM_CONFIG_CACHE: /tmp/npm-cache
    ports:
      - "5173:5173"

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: no_excuse
      POSTGRES_USER: no_excuse
      POSTGRES_PASSWORD: no_excuse
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U no_excuse -d no_excuse"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "6389:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  web-node-modules:
