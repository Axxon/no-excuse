x-api: &api
  image: ${NO_EXCUSE_API_IMAGE:-no-excuse-api:local}
  pull_policy: never
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  environment:
    APP_NAME: no-excuse-demo
    APP_KEY: ${APP_KEY}
    APP_URL: https://no-excuse.pro
    APP_ENV: production
    APP_DEBUG: "false"
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: no_excuse_demo
    DB_USERNAME: no_excuse_demo
    DB_PASSWORD: ${DB_PASSWORD}
    CACHE_STORE: redis
    QUEUE_CONNECTION: redis
    REDIS_CLIENT: predis
    REDIS_HOST: redis
    REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-240}
    NO_EXCUSE_TOKEN_LIFETIME_HOURS: ${NO_EXCUSE_TOKEN_LIFETIME_HOURS:-12}
    MAIL_MAILER: ${MAIL_MAILER:-log}
    MAIL_SCHEME: ${MAIL_SCHEME:-null}
    MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
    MAIL_PORT: ${MAIL_PORT:-2525}
    MAIL_USERNAME: ${MAIL_USERNAME:-null}
    MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
    MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-notifications@example.com}
    MAIL_FROM_NAME: ${MAIL_FROM_NAME:-no-excuse}
    NO_EXCUSE_AI_MODE: demo
    OPENAI_STORE: "false"
    NO_EXCUSE_PUBLIC_DEMO: "true"
    NO_EXCUSE_DEMO_LIFETIME_HOURS: ${NO_EXCUSE_DEMO_LIFETIME_HOURS:-4}
    NO_EXCUSE_DEMO_MAX_SESSIONS: ${NO_EXCUSE_DEMO_MAX_SESSIONS:-20}
    NO_EXCUSE_AUTHOR_NAME: ${NO_EXCUSE_AUTHOR_NAME:-Project author}
    NO_EXCUSE_AUTHOR_LINKEDIN_URL: ${NO_EXCUSE_AUTHOR_LINKEDIN_URL:-}
    NO_EXCUSE_DEMO_PROCESSING_DELAY_SECONDS: ${NO_EXCUSE_DEMO_PROCESSING_DELAY_SECONDS:-2}
    NO_EXCUSE_DEMO_SCREENING_WORKERS: ${NO_EXCUSE_DEMO_SCREENING_WORKERS:-2}
    NO_EXCUSE_DEMO_SCORING_WORKERS: ${NO_EXCUSE_DEMO_SCORING_WORKERS:-1}
  volumes:
    - demo-storage:/app/storage
  depends_on:
    migrate:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
  networks:
    - internal
services:
  migrate:
    image: ${NO_EXCUSE_API_IMAGE:-no-excuse-api:local}
    build:
      context: ${SOURCE_ARCHIVE_URL:-.}
      dockerfile: deploy/remote/api.Dockerfile
    command: php artisan migrate --force
    restart: "no"
    environment:
      APP_NAME: no-excuse-demo
      APP_KEY: ${APP_KEY}
      APP_URL: https://no-excuse.pro
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: no_excuse_demo
      DB_USERNAME: no_excuse_demo
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-240}
      MAIL_MAILER: log
      NO_EXCUSE_AI_MODE: demo
      OPENAI_STORE: "false"
      NO_EXCUSE_PUBLIC_DEMO: "true"
    volumes:
      - demo-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  api:
    <<: *api
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/up') === false ? 1 : 0);"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  queue-intake:
    <<: *api
    command: php artisan queue:adaptive screening

  queue-scoring:
    <<: *api
    command: php artisan queue:adaptive scoring

  queue-notifications:
    <<: *api
    command: php artisan queue:work redis --queue=notifications --sleep=1 --tries=3 --timeout=60

  scheduler:
    <<: *api
    command: php artisan schedule:work

  web:
    image: ${NO_EXCUSE_WEB_IMAGE:-no-excuse-web:local}
    build:
      context: ${SOURCE_ARCHIVE_URL:-.}
      dockerfile: deploy/remote/web.Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${DEMO_HTTP_PORT:-8088}:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: no_excuse_demo
      POSTGRES_USER: no_excuse_demo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - demo-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U no_excuse_demo -d no_excuse_demo"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

volumes:
  demo-storage:
  demo-postgres:

networks:
  internal:
    driver: bridge
