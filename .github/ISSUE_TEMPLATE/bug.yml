name: Bug report
description: Report a reproducible problem that does not contain sensitive data.
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include a real CV, candidate identity, API key or vulnerability. Report security issues privately as described in SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reproducible sequence using fictional data.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Docker/Compose versions, browser and relevant non-secret configuration.
