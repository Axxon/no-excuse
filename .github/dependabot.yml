version: 2
updates:
  - package-ecosystem: composer
    directory: /api
    schedule:
      interval: weekly
    groups:
      php-dependencies:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
