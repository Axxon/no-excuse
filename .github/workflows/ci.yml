name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build containers
        run: make build
      - name: Install PHP dependencies
        run: make install
      - name: Start development services
        run: make up
      - name: Validate backend and frontend
        run: make validate
      - name: Build isolated public demo images
        run: make demo-prod-build DEMO_ENV_FILE=.env.demo.example
