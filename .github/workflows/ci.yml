name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build containers
        run: make build
      - name: Install PHP dependencies
        run: make install
      - name: Start development services
        run: make up
      - name: Validate backend and frontend
        run: make validate
      - name: Build isolated public demo images
        run: make demo-prod-build DEMO_ENV_FILE=.env.demo.example
