services:
  api:
    environment:
      APP_ENV: testing
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: no_excuse_test
      DB_USERNAME: no_excuse
      DB_PASSWORD: no_excuse
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
    command: php artisan test
    ports: !reset []

  postgres:
    environment:
      POSTGRES_DB: no_excuse_test
      POSTGRES_USER: no_excuse
      POSTGRES_PASSWORD: no_excuse
    ports: !reset []

  redis:
    ports: !reset []

  queue-intake:
    profiles: ["disabled"]

  queue-scoring:
    profiles: ["disabled"]

  queue-notifications:
    profiles: ["disabled"]

  scheduler:
    profiles: ["disabled"]

  web:
    profiles: ["disabled"]
