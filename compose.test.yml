services:
  api:
    environment:
      APP_ENV: testing
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
    command: php artisan test
    ports: []

  postgres:
    environment:
      POSTGRES_DB: no_excuse_test
    ports: []

  redis:
    ports: []

  queue-intake:
    profiles: ["disabled"]

  queue-scoring:
    profiles: ["disabled"]

  queue-notifications:
    profiles: ["disabled"]

  scheduler:
    profiles: ["disabled"]

  web:
    profiles: ["disabled"]
